name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  SDK_DIST_NAME: "sap-cloud-sdk"

jobs:
  build:
    name: Build SDK
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: "Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Run Unit Tests"
        run: uv run pytest -m "not integration"

      - name: "Build Packages"
        run: uv build

      - name: "List Build Artifacts"
        run: |
          echo "Build artifacts:"
          ls -lh dist/

      - name: "Verify Build Artifacts"
        run: |
          # Check that both wheel and source distribution were created
          wheel_count=$(ls -1 dist/*.whl 2>/dev/null | wc -l)
          tar_count=$(ls -1 dist/*.tar.gz 2>/dev/null | wc -l)
          
          if [ "$wheel_count" -eq 0 ]; then
            echo "ERROR: No wheel file found"
            exit 1
          fi
          
          if [ "$tar_count" -eq 0 ]; then
            echo "ERROR: No source distribution found"
            exit 1
          fi
          
          echo "✓ Build artifacts verified: $wheel_count wheel(s), $tar_count source distribution(s)"

      - name: "Upload Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SDK_DIST_NAME }}
          path: dist/
          retention-days: 7