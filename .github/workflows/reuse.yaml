name: REUSE Compliance Check

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  check-reuse-compliance:
    runs-on: ${{ contains(github.server_url, 'github.com') && 'ubuntu-latest' || fromJSON('["self-hosted"]') }}
    steps:
    - uses: actions/checkout@v6

    - name: REUSE Compliance Check
      uses: fsfe/reuse-action@v6.0.0
